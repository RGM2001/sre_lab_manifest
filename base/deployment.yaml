apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  # namespace удалили
spec:
  replicas: 1 # По умолчанию пусть будет 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
