apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  # namespace удалили
spec:
  replicas: 1 # По умолчанию пусть будет 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: ghcr.io/rgm2001/sre-lab-app:3a9a7ab44d24e652ed7034ec3ffba0b822fa3d54
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
